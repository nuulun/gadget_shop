groups:
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 30 seconds."

      - alert: HighErrorRate
        expr: >
          sum(rate(http_requests_total{status_code=~"5.."}[2m])) by (job)
          /
          sum(rate(http_requests_total[2m])) by (job)
          * 100 > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} error rate is above 5% for 1 minute."

      - alert: HighCPUUsage
        expr: >
          rate(process_cpu_seconds_total[2m]) * 100
          / scalar(count(count(node_cpu_seconds_total{job="node-exporter"}) by (cpu)))
          > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.job }}"
          description: "{{ $labels.job }} CPU usage is above 80% for 2 minutes."

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 400 * 1024 * 1024
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "{{ $labels.job }} is using more than 400MB of memory."

      - alert: HighRequestLatency
        expr: >
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[2m])) by (le, job)
          ) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 latency is above 1 second."
