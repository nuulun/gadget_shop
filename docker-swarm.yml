version: '3.8'

networks:
  app-network:
    driver: overlay

volumes:
  postgres_auth_data:
  postgres_account_data:
  postgres_product_data:
  postgres_order_data:
  postgres_payment_data:
  postgres_notification_data:
  prometheus_data:
  grafana_data:
  loki_data:

services:

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  account-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${ACCOUNT_DB_USER}
      POSTGRES_PASSWORD: ${ACCOUNT_DB_PASSWORD}
      POSTGRES_DB: ${ACCOUNT_DB_NAME}
    volumes:
      - postgres_account_data:/var/lib/postgresql/data
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  product-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POSTGRES_DB: ${PRODUCT_DB_NAME}
    volumes:
      - postgres_product_data:/var/lib/postgresql/data
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_NAME}
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  auth-service:
    image: auth-service:latest
    environment:
      HTTP_PORT: "8081"
      DB_DSN: "host=auth-db port=5432 user=${AUTH_DB_USER} password=${AUTH_DB_PASSWORD} dbname=${AUTH_DB_NAME} sslmode=disable"
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_TTL_MINUTES: "60"
      REFRESH_TOKEN_TTL_DAYS: "30"
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  account-service:
    image: account-service:latest
    environment:
      HTTP_PORT: "8082"
      DB_DSN: "host=account-db port=5432 user=${ACCOUNT_DB_USER} password=${ACCOUNT_DB_PASSWORD} dbname=${ACCOUNT_DB_NAME} sslmode=disable"
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  product-service:
    image: product-service:latest
    environment:
      HTTP_PORT: "8083"
      DB_DSN: "host=product-db port=5432 user=${PRODUCT_DB_USER} password=${PRODUCT_DB_PASSWORD} dbname=${PRODUCT_DB_NAME} sslmode=disable"
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  order-service:
    image: order-service:latest
    environment:
      HTTP_PORT: "8084"
      DB_DSN: "host=order-db port=5432 user=${ORDER_DB_USER} password=${ORDER_DB_PASSWORD} dbname=${ORDER_DB_NAME} sslmode=disable"
      PRODUCT_SERVICE_URL: "http://product-service:8083"
    networks: [app-network]
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  payment-service:
    image: payment-service:latest
    environment:
      HTTP_PORT: "8085"
      DB_DSN: "host=payment-db port=5432 user=${PAYMENT_DB_USER} password=${PAYMENT_DB_PASSWORD} dbname=${PAYMENT_DB_NAME} sslmode=disable"
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  notification-service:
    image: notification-service:latest
    environment:
      HTTP_PORT: "8086"
      DB_DSN: "host=notification-db port=5432 user=${NOTIFICATION_DB_USER} password=${NOTIFICATION_DB_PASSWORD} dbname=${NOTIFICATION_DB_NAME} sslmode=disable"
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  gateway:
    image: gateway:latest
    environment:
      HTTP_PORT: "8080"
      AUTH_SERVICE_URL: "http://auth-service:8081"
      ACCOUNT_SERVICE_URL: "http://account-service:8082"
      PRODUCT_SERVICE_URL: "http://product-service:8083"
      ORDER_SERVICE_URL: "http://order-service:8084"
      PAYMENT_SERVICE_URL: "http://payment-service:8085"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8086"
      JWT_SECRET: ${JWT_SECRET}
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: frontend:latest
    ports:
      - "80:80"
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks: [app-network]
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks: [app-network]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
