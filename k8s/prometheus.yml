apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gadget-shop
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: 'gateway'
        static_configs:
          - targets: ['gateway:8080']

      - job_name: 'auth-service'
        static_configs:
          - targets: ['auth-service:8081']

      - job_name: 'account-service'
        static_configs:
          - targets: ['account-service:8082']

      - job_name: 'product-service'
        static_configs:
          - targets: ['product-service:8083']

      - job_name: 'order-service'
        static_configs:
          - targets: ['order-service:8084']

      - job_name: 'payment-service'
        static_configs:
          - targets: ['payment-service:8085']

      - job_name: 'notification-service'
        static_configs:
          - targets: ['notification-service:8086']

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: '(.*):10250'
            replacement: '${1}:9100'
            target_label: __address__

  alerts.yml: |
    groups:
      - name: service_health
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: "Service is down"

          - alert: HighErrorRate
            expr: >
              sum(rate(http_requests_total{status_code=~"5.."}[2m])) by (job)
              / sum(rate(http_requests_total[2m])) by (job) * 100 > 5
            for: 1m
            labels:
              severity: warning

          - alert: HighCPUUsage
            expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
            for: 2m
            labels:
              severity: warning

          - alert: HighMemoryUsage
            expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
            for: 2m
            labels:
              severity: warning
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gadget-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--web.enable-lifecycle'
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gadget-shop
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30090
