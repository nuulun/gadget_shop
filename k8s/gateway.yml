apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: gadget-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway:latest
        imagePullPolicy: Never
        env:
        - name: HTTP_PORT
          value: "8080"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8081"
        - name: ACCOUNT_SERVICE_URL
          value: "http://account-service:8082"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:8083"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:8084"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8085"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:8086"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: gadget-shop
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30800
