apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: gadget-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: order-service:latest
        imagePullPolicy: Never
        env:
        - name: HTTP_PORT
          value: "8084"
        - name: DB_DSN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: ORDER_DB_DSN
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:8083"
        ports:
        - containerPort: 8084
        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 10
          periodSeconds: 15
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: gadget-shop
spec:
  selector:
    app: order-service
  ports:
  - port: 8084
    targetPort: 8084
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: gadget-shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
