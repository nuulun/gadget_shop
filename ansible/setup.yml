---
- name: Setup VM — install Docker and k3s
  hosts: gcp_vm
  become: true

  tasks:
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present
        update_cache: true

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Enable and start k3s
      systemd:
        name: k3s
        enabled: true
        state: started

    - name: Make k3s kubeconfig readable
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: "0644"

    - name: Clone gadget_shop repository
      git:
        repo: https://github.com/nuulun/gadget_shop.git
        dest: /home/ubuntu/gadget_shop
        force: true
      become_user: ubuntu

    - name: Set repo ownership
      file:
        path: /home/ubuntu/gadget_shop
        owner: ubuntu
        group: ubuntu
        recurse: true
